# 1. Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=prod_user
spring.datasource.password=prod_password_123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA/Hibernate Production Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Production mein hamesha 'validate' ya 'none' rakhte hain taaki existing data delete na ho
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 3. Connection Pool (Optimized for Production)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# 4. Logging (Reduced verbosity for performance)
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.web=INFO

# 5. Actuator Security (Health check only)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# 6. Swagger (Often disabled in production for security, but can be enabled if needed)
springdoc.api-docs.enabled=true