spring:
    application:
        name: Quantity Measurement App

    datasource:
        url: jdbc:h2:mem:quantitymeasurementdb
        driverClassName: org.h2.Driver
        username: sa
        password:

    h2:
        console:
            enabled: true
            path: /h2-console

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope:
                            - profile
                            - email
                        redirect-uri: "https://quantitymeasurementapp-production-16d3.up.railway.app/login/oauth2/code/google"

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

server:
    port: ${PORT:8080}
    forward-headers-strategy: framework
